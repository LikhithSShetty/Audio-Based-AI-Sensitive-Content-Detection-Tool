# filepath: config/sensitive_criteria.yaml
# Example configuration for sensitive content criteria

# --- Whisper Settings ---
whisper_model: "base" # Use 'base' model for better accuracy
language: "en"        # Explicitly set language to English

# --- Output Settings ---
output_directory: "output"

# --- Identification Criteria ---
# Simple keyword matching (case-insensitive)
keywords:
  - "secret"
  # - "confidential" # Example
  # - "project alpha" # Example multi-word
  - "Alliance" # Example word from the transcript

